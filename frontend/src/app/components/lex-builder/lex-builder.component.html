<p-panel #panelRef>
    <ng-template pTemplate="header">
        <div class="flex justify-content-between align-items-center w-full">
            <div>
                <h2>Lex Builder</h2>
            </div>
            <p-toolbar>
                <p-button label="Add Definition" icon="pi pi-plus" (click)="addWordDef()"></p-button>
                <p-button label="Save" [disabled]="currentLexForm$.value.length === 0" icon="pi pi-save" (click)="save()"></p-button>
                <p-button label="Delete" [disabled]="currentLexForm$.value.length === 0" icon="pi pi-trash" (click)="delete()"></p-button>
            </p-toolbar>
        </div>
    </ng-template>
    <ng-template pTemplate="body">
        <p-splitter 
            [style]="{ height: '65vh', width: '100%' }" 
            styleClass="mb-5"
            [minSizes]="[25,25]"
            [panelSizes]="[40,60]">
            <ng-template pTemplate>
                <div class="grid grid-nogutter" #wordListWrapper>
                    
                
                    <!-- <div class="col-12"> -->
                        <p-scrollPanel 
                            [style]="{ width: '100%', height: '62vh' }"
                            styleClass="w-full p-2">
                            <app-word-list #wordListPanel [wrapperElement]="wordListWrapper" (currentLexChange)="handleLexChange($event)"></app-word-list>
                        </p-scrollPanel>
                    <!-- </div> -->
                </div>
            </ng-template>

            <ng-template pTemplate>
                @for(entry of currentLexForm$ | async; track entry.dbId) {
                    <p-scrollPanel [style]="{ width: '100%', height: '62vh' }">
                        <div #lexFormWrapper>
                            <ws-element-renderer #lexFormRef
                                [elements]="entry.elements"
                                [form]="entry.form"
                                [actionMap]="entry.actionMap">
    
                            </ws-element-renderer>
                        </div>
                    </p-scrollPanel>
                }
                
            </ng-template>

        </p-splitter>
    </ng-template>
</p-panel>
